name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: obscura-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: macos-latest
            name: obscura-aarch64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            name: obscura-aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-13
            name: obscura-x86_64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: obscura-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.os == 'macos-latest'
        run: cargo install cross

      - name: Build
        run: |
          if [ "${{ matrix.os }}" == 'macos-latest' ] && [ "${{ matrix.target }}" == 'aarch64-unknown-linux-gnu' ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build stealth
        run: |
          if [ "${{ matrix.os }}" == 'macos-latest' ] && [ "${{ matrix.target }}" == 'aarch64-unknown-linux-gnu' ]; then
            cross build --release --target ${{ matrix.target }} --features stealth
          else
            cargo build --release --target ${{ matrix.target }} --features stealth
          fi
        continue-on-error: true

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz obscura obscura-worker || tar czf ../../../${{ matrix.name }}.tar.gz obscura
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }}.zip obscura.exe obscura-worker.exe || 7z a ../../../${{ matrix.name }}.zip obscura.exe
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
